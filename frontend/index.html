<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nisanth Wallet 😉</title>
    <meta name="description" content="Premium, private memory sharing platform for Gokul & Nivetha." />
    <!-- Preconnect Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script>
      const getApiUrl = () => {
        const hostname = window.location.hostname;
        const isLocal = hostname === 'localhost' ||
                        hostname === '127.0.0.1' ||
                        hostname.startsWith('192.168.') ||
                        hostname.startsWith('10.') ||
                        hostname.startsWith('172.') ||
                        hostname.endsWith('.local') ||
                        /^[0-9.]+$/.test(hostname);
        return isLocal ? `http://${hostname}:5000` : 'https://nisanth-bsts.onrender.com';
      };
      window.API_URL = getApiUrl();
    </script>
  </head>

  <body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
